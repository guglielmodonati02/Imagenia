<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Leads — IMAGENIA</title>
  <link rel="stylesheet" href="/css/styles.css">
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    body { background:var(--primary); display:flex; align-items:center; justify-content:center; min-height:100svh; }
    .login-card { background:var(--surface-container-lowest); border-radius:var(--radius-lg); padding:3rem; width:100%; max-width:400px; box-shadow:0 32px 80px rgba(27,28,28,0.3); }
    .login-logo { font-family:'Manrope',sans-serif;font-weight:800;font-size:1.75rem;color:var(--primary);letter-spacing:-0.03em;margin-bottom:0.25rem; }
    .login-sub { font-size:0.85rem;color:var(--on-surface-variant);margin-bottom:2rem; }
    .error-msg { background:#fef2f2;color:var(--error);padding:0.75rem 1rem;border-radius:var(--radius-sm);font-size:0.85rem;margin-bottom:1rem;display:none; }
    .error-msg.show { display:block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">IMAGENIA</div>
    <div class="login-sub">Panel de visualización de leads</div>
    <div class="error-msg" id="error-msg">Credenciales incorrectas. Verifica tu email y contraseña.</div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="l-email" required autofocus placeholder="leads@imagenia.mx">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="l-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-3" id="login-btn">Iniciar sesión</button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:var(--on-surface-variant)">
      <a href="/index.html" style="color:var(--secondary)">← Volver al sitio</a>
    </p>
  </div>
  <script type="module">
    import { signIn, getUser, getUserRole, supabase } from '/js/supabase.js';
    
    // If already logged in, redirect based on role
    getUser().then(async (u) => {
      if (u) {
        const role = await getUserRole(u.email);
        if (role === 'leads_viewer' || role === 'admin') {
          window.location.href = '/leads-admin/index.html';
        } else {
          window.location.href = '/admin/index.html';
        }
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.remove('show');
      btn.textContent = 'Verificando...'; btn.disabled = true;

      const { data, error } = await signIn(
        document.getElementById('l-email').value,
        document.getElementById('l-password').value
      );

      if (error) {
        errEl.textContent = 'Credenciales incorrectas. Verifica tu email y contraseña.';
        errEl.classList.add('show');
        btn.textContent = 'Iniciar sesión'; btn.disabled = false;
      } else {
        const role = await getUserRole(data.user?.email);
        if (role !== 'leads_viewer' && role !== 'admin') {
          await supabase.auth.signOut();
          errEl.textContent = 'Esta cuenta no tiene permisos para acceder a este panel de Leads.';
          errEl.classList.add('show');
          btn.textContent = 'Iniciar sesión'; btn.disabled = false;
        } else {
          window.location.href = '/leads-admin/index.html';
        }
      }
    });
  </script>
</body>
</html>
