<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMAGENIA - Mobiliario Sustentable para exterior.</title>
  <meta name="description" content="Descarga todos nuestros catálogos de juegos infantiles y mobiliario para exterior con plástico reciclado.">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="IMAGENIA - Mobiliario Sustentable para exterior.">
  <meta property="og:description" content="Descarga todos nuestros catálogos de juegos infantiles y mobiliario para exterior con plástico reciclado.">
  <meta property="og:image" content="https://www.imagenia.com.mx/assets/logo_con_letras_blancas.png">
  <meta property="og:url" content="https://www.imagenia.com.mx/catalogos.html">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="IMAGENIA - Mobiliario Sustentable para exterior.">
  <meta name="twitter:description" content="Descarga todos nuestros catálogos de juegos infantiles y mobiliario para exterior con plástico reciclado.">
  <meta name="twitter:image" content="https://www.imagenia.com.mx/assets/logo_con_letras_blancas.png">

  <link rel="icon" type="image/x-icon" href="/assets/LOGO SIN FONDO.ico">
  <link rel="stylesheet" href="/css/styles.css?v=1.11">
  <style>
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
    }

    .catalog-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-ambient);
      transition: transform var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Asymmetric Layout */
    .catalog-card:first-child {
      grid-column: 1 / -1;
      min-height: 460px;
    }

    .catalog-card:not(:first-child) {
      min-height: 250px;
    }

    .catalog-card:not(:first-child) .catalog-title {
      font-size: 2rem;
    }

    .catalog-card:not(:first-child) .catalog-info {
      padding: 2rem;
    }

    .catalog-card:hover {
      transform: translateY(-4px);
    }

    .catalog-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .catalog-cover::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.3) 60%, transparent 100%);
    }

    .catalog-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .catalog-cover .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
    }

    .catalog-cover .cover-placeholder .material-symbols-outlined {
      font-size: 4rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .catalog-cover .cover-placeholder span:last-child {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .catalog-info {
      position: relative;
      z-index: 1;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 60%;
    }

    .catalog-badge {
      display: inline-block;
      padding: 0.3rem 0.75rem;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px);
      color: #fff;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      width: fit-content;
    }

    .catalog-title {
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      font-size: 3rem;
      color: #fff;
      line-height: 1.1;
    }

    .catalog-sub {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .catalog-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .catalog-meta span {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
    }

    .catalog-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    @media(max-width:700px) {
      .catalog-grid {
        grid-template-columns: 1fr;
      }

      .catalog-card:first-child,
      .catalog-card:not(:first-child) {
        grid-column: 1 / -1;
        min-height: 360px;
        justify-content: flex-end;
      }

      .catalog-info {
        padding: 2rem;
        max-width: 100%;
      }

      .catalog-cover::after {
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.4) 70%, transparent 100%);
      }

      .catalog-title {
        font-size: 2.2rem;
      }
    }

    .empty-catalogs {
      text-align: center;
      padding: 6rem 2rem;
    }

    .empty-catalogs .material-symbols-outlined {
      font-size: 4rem;
      color: var(--outline-variant);
      display: block;
      margin-bottom: 1rem;
    }

    /* Catalog Selectors and Animations */
    .catalog-selectors {
      display: flex;
      gap: 0.75rem;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: 1rem 0;
      margin-bottom: 1rem;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .catalog-selectors::-webkit-scrollbar {
      display: none;
    }

    .catalog-selector-chip {
      background: var(--surface-container-high);
      color: var(--on-surface);
      border: 1px solid var(--outline-variant);
      border-radius: 99px;
      padding: 0.5rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
    }

    .catalog-selector-chip:hover {
      background: var(--primary);
      color: var(--on-primary);
      border-color: var(--primary);
    }

    .catalog-card.highlight {
      transform: scale(1.03) !important;
      z-index: 10;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 0 0 2px var(--primary);
      border: 2px solid var(--primary);
      filter: brightness(1.15);
    }
  </style>
</head>

<body>
  <div id="nav-placeholder"></div>
  <main>
    <div class="page-header" id="catalogos-header">
      <div class="container">
        <span class="label-sm text-secondary">Recursos</span>
        <h1>Catálogos</h1>
        <p>Descarga nuestros catálogos completos en formato PDF.</p>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div id="catalog-selectors" class="catalog-selectors">
          <!-- Selectors will be dynamically populated here -->
        </div>
        <div class="catalog-grid" id="catalog-grid">
          <!-- Skeletons -->
          <div class="skeleton" style="height:300px;border-radius:var(--radius-lg)"></div>
          <div class="skeleton" style="height:300px;border-radius:var(--radius-lg)"></div>
          <div class="skeleton" style="height:300px;border-radius:var(--radius-lg)"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>

  <!-- PDF Preview Modal -->
  <div class="modal-overlay" id="modal-pdf-preview">
    <div class="modal"
      style="max-width:1000px; height:90vh; display:flex; flex-direction:column; padding:0; overflow:hidden;">
      <div class="modal-header"
        style="padding:1rem 1.5rem; border-bottom:1px solid var(--outline-variant); background:var(--surface-container-lowest); display:flex; justify-content:space-between; align-items:center;">
        <h3 id="pdf-preview-title" style="margin:0; font-family:'Manrope',sans-serif; color:var(--primary);">Preview
        </h3>
        <button class="modal-close" style="background:none;border:none;cursor:pointer;color:var(--on-surface);"
          onclick="document.getElementById('modal-pdf-preview').classList.remove('open'); document.getElementById('pdf-iframe').src='';"><span
            class="material-symbols-outlined">close</span></button>
      </div>
      <div class="modal-body" style="flex:1; padding:0; background:#ececec;">
        <iframe id="pdf-iframe" src="" style="width:100%; height:100%; border:none;"></iframe>
      </div>
    </div>
  </div>

  <script type="module" src="/js/catalogos.js?v=1.2"></script>
</body>

</html>
