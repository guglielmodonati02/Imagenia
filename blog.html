<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — IMAGENIA</title>
  <meta name="description" id="meta-desc" content="Lee nuestro último artículo en IMAGENIA.">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="article">
  <meta property="og:title" id="og-title" content="Blog — IMAGENIA">
  <meta property="og:description" id="og-desc" content="Lee nuestro último artículo en IMAGENIA.">
  <meta property="og:image" id="og-image" content="https://www.imagenia.com.mx/assets/logo_con_letras_blancas.png">
  <meta property="og:url" id="og-url" content="https://www.imagenia.com.mx/blog.html">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="tw-title" content="Blog — IMAGENIA">
  <meta name="twitter:description" id="tw-desc" content="Lee nuestro último artículo en IMAGENIA.">
  <meta name="twitter:image" id="tw-image" content="https://www.imagenia.com.mx/assets/logo_con_letras_blancas.png">

  <link rel="icon" type="image/x-icon" href="/assets/LOGO SIN FONDO.ico">
  <link rel="stylesheet" href="/css/styles.css">
  <!-- Estilos base de Quill para que los formatos y tamaños se vean igual que en el admin -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <style>
    /* Reutiliza el mismo page-header que productos.html, impacto.html, etc. */
    .blog-page {
      padding: 4rem 1rem 6rem;
      background: var(--surface);
      min-height: 80vh;
    }
    .blog-inner {
      max-width: 800px;
      margin: 0 auto;
      background: var(--surface-container-lowest);
      padding: 3rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-ambient);
    }
    @media (max-width: 768px) {
      .blog-inner { padding: 2rem 1.5rem; }
    }
    .blog-header h1 {
      color: var(--primary);
      margin-bottom: 1rem;
      font-size: clamp(2rem, 5vw, 3rem);
    }
    .blog-meta {
      color: var(--on-surface-variant);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--surface-container-high);
      font-weight: 500;
    }
    .blog-content {
      color: var(--on-surface);
      line-height: 1.8;
      font-size: 1.05rem;
    }
    /* Limpieza de estilos Quill para que encaje con la marca */
    .ql-editor {
      padding: 0;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
      color: inherit;
    }
    .ql-editor h2 { margin-top: 2rem; margin-bottom: 1rem; color: var(--primary); font-size: 1.8rem; font-family: 'Manrope', sans-serif; }
    .ql-editor h3 { margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--on-surface); font-size: 1.4rem; font-family: 'Manrope', sans-serif; }
    .ql-editor p { margin-bottom: 1.25rem; }
    .ql-editor ul, .ql-editor ol { margin-bottom: 1.25rem; padding-left: 2rem; }
    .ql-editor li { margin-bottom: 0.5rem; }
    .ql-editor a { color: var(--secondary); text-decoration: underline; }
    .ql-editor img { max-width: 100%; border-radius: var(--radius-md); margin: 1.5rem 0; box-shadow: var(--shadow-card); }
    .blog-content img {
      max-width: 100%;
      border-radius: var(--radius-md);
      margin: 2rem 0;
      box-shadow: var(--shadow-card);
    }
    .blog-media-wrap {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--surface-container-high);
    }
    .blog-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--secondary);
      font-weight: 700;
      margin-bottom: 2rem;
      transition: color var(--transition);
      text-decoration: none;
    }
    .blog-back:hover { color: var(--primary); }
    
    .loading-state {
      text-align: center;
      padding: 5rem 0;
      color: var(--on-surface-variant);
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <!-- Page header igual al de otras páginas (se posiciona debajo del navbar fijo) -->
  <div class="page-header">
    <div class="container">
      <span class="label-sm text-secondary">Artículo</span>
      <h1 id="blog-page-title" style="font-size:clamp(1.5rem,4vw,2.5rem);margin-top:0.5rem">Cargando...</h1>
    </div>
  </div>

  <main class="blog-page">
    <div class="container" style="max-width: 1440px;">
      <a href="/impacto.html" class="blog-back">
        <span class="material-symbols-outlined">arrow_back</span> Volver a Impacto
      </a>
      
      <div class="blog-inner" id="blog-container">
        <div class="loading-state">
          <h2>Cargando artículo...</h2>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="/js/blog.js?v=1.2"></script>
</body>
</html>
