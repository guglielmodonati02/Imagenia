<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — IMAGENIA</title>
  <meta name="description" content="Lee nuestro último artículo en IMAGENIA.">
  <link rel="stylesheet" href="/css/styles.css">
  <!-- Estilos base de Quill para que los formatos y tamaños se vean igual que en el admin -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <style>
    .blog-page {
      padding: 9rem 2rem 6rem;
      background: var(--surface);
      min-height: 80vh;
    }
    .blog-inner {
      max-width: 800px;
      margin: 0 auto;
      background: var(--surface-container-lowest);
      padding: 3rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-ambient);
    }
    @media (max-width: 768px) {
      .blog-inner { padding: 2rem 1.5rem; }
    }
    .blog-header h1 {
      color: var(--primary);
      margin-bottom: 1rem;
      font-size: clamp(2rem, 5vw, 3rem);
    }
    .blog-meta {
      color: var(--on-surface-variant);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--surface-container-high);
      font-weight: 500;
    }
    .blog-content {
      color: var(--on-surface);
      line-height: 1.8;
      font-size: 1.05rem;
    }
    /* Limpieza de estilos Quill para que encaje con la marca */
    .ql-editor {
      padding: 0;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
      color: inherit;
    }
    .ql-editor h2 { margin-top: 2rem; margin-bottom: 1rem; color: var(--primary); font-size: 1.8rem; font-family: 'Manrope', sans-serif; }
    .ql-editor h3 { margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--on-surface); font-size: 1.4rem; font-family: 'Manrope', sans-serif; }
    .ql-editor p { margin-bottom: 1.25rem; }
    .ql-editor ul, .ql-editor ol { margin-bottom: 1.25rem; padding-left: 2rem; }
    .ql-editor li { margin-bottom: 0.5rem; }
    .ql-editor a { color: var(--secondary); text-decoration: underline; }
    .blog-content img {
      max-width: 100%;
      border-radius: var(--radius-md);
      margin: 2rem 0;
      box-shadow: var(--shadow-card);
    }
    .blog-media-wrap {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--surface-container-high);
    }
    .blog-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--secondary);
      font-weight: 700;
      margin-bottom: 2rem;
      transition: color var(--transition);
      text-decoration: none;
    }
    .blog-back:hover { color: var(--primary); }
    
    .loading-state {
      text-align: center;
      padding: 5rem 0;
      color: var(--on-surface-variant);
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="blog-page">
    <div class="container" style="max-width: 1440px;">
      <a href="/impacto.html" class="blog-back">
        <span class="material-symbols-outlined">arrow_back</span> Volver a Impacto
      </a>
      
      <div class="blog-inner" id="blog-container">
        <div class="loading-state">
          <h2>Cargando artículo...</h2>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="/js/blog.js?v=1.1"></script>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
